  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Order</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.box{
flex:1;
min-width:320px;
background:#111;
padding:25px;
border-radius:18px;
border:1px solid rgba(212,175,55,.3);
}

.box h2{
margin-bottom:20px;
color:#d4af37;
}

input,
select{
width:100%;
padding:14px;
margin:10px 0;
background:#1b1b1b;
border:none;
border-radius:10px;
color:white;
}

.product{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.product img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
}

.price{
font-size:26px;
font-weight:bold;
color:#d4af37;
margin:15px 0;
}

.buy-btn{
width:100%;
padding:14px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#d4af37,#b8860b);
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.4s;
}

.buy-btn:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(212,175,55,.4);
}

</style>
</head>

<body>


<div class="box">

<h2>Place Your Order</h2>

<div class="product">

<img src="https://i.ibb.co/ZRLbwWWk/Chat-GPT-Image-Jun-19-2026-02-32-43-PM.png">

<div>
<h3>AirPods Pro 2</h3>
<p>Crystal clear sound</p>
</div>

</div>

<hr style="border-color:#333;margin:15px 0;">

<p>Product Price: RS 999</p>
<p>Delivery: RS 200</p>

<div class="price">
Total: RS 1199
</div>

<form id="orderForm">

<input type="text" name="name" placeholder="Full Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="text" name="product" placeholder="Product Name" required>

<input type="text" name="address" placeholder="Delivery Address" required>

<button type="submit" class="buy-btn">
Complete Purchase
</button>

</form>

<div id="successMessage"></div>



</div>

</div>
<script>
function placeOrder(){
document.getElementById("successMessage").style.display="block";
}
</script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
