  <!DOCTYPE html>

<title>Complete Order</title>

<style>

*{
margin:0;

body{

<body>

<style>

  display: flex;

<form id="orderForm">


<!DOCTYPE html>
<html>
<head>
  <title>Order Page</title>
</head>
<body>

<h2 class="title">Place Your Order</h2>

<style>
.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  color: #d4af37; /* gold */
  background: #0b0b0b; /* black */
  padding: 10px 18px;
  border-radius: 12px;
  display: inline-block;
  letter-spacing: 1px;
  border: 1px solid #d4af37;
  box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
  text-transform: uppercase;
}
</style>

<input id="name" placeholder="Enter Name"><br><br>
<input id="phone" placeholder="Enter Phone"><br><br>
<input id="product" placeholder="Enter Product"><br><br>

<button onclick="sendWhatsApp()" class="gold-btn">
  Complete Order
</button>

<style>
.gold-btn {
  padding: 12px 28px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #0b0b0b;

  background: linear-gradient(135deg, #d4af37, #f5d76e);
  border: 2px solid #d4af37;
  border-radius: 12px;

  box-shadow: 0 10px 25px rgba(212, 175, 55, 0.35);
  transition: all 0.3s ease;
}

.gold-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 30px rgba(212, 175, 55, 0.5);
}

.gold-btn:active {
  transform: scale(0.98);
}
</style>

<script>
function sendWhatsApp() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let product = document.getElementById("product").value;

  if(!name || !phone || !product){
    alert("Please fill all fields first!");
    return;
  }

  let message =
`🛒 NEW ORDER RECEIVED
---------------------
Name: ${name}
Phone: ${phone}
Product: ${product}
---------------------`;

  let whatsappNumber = "447915007157"; // 🔴 yahan apna number dalna (92 format)

  let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>

</button>

</form>





</div>

</div>

</script>
</body>
